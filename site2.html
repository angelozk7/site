<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para minha princesa ❤️</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(#ff9ecf,#ff6fb0);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
height:100vh;
overflow:hidden;
padding:20px;
}

/* corações no fundo */

.bg-heart{
position:absolute;
font-size:24px;
animation:float 6s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* fio */

#fio{
width:10px;
height:120px;
background:white;
border-radius:10px;
margin-top:20px;
cursor:pointer;
}

/* envelope */

.envelope{
width:240px;
height:140px;
background:white;
border-radius:12px;
position:relative;
margin-top:20px;
cursor:pointer;
}

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:120px solid transparent;
border-right:120px solid transparent;
border-top:70px solid #ffd6e7;
transition:0.6s;
}

.envelope.open:before{
transform:rotateX(180deg);
top:-70px;
}

/* carta */

.carta{
display:none;
background:white;
color:#ff4fa3;
padding:20px;
border-radius:12px;
margin-top:20px;
width:260px;
}

/* coração */

.heart{
font-size:80px;
cursor:pointer;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* explosão */

.explode{
position:absolute;
font-size:26px;
animation:explode 1s forwards;
}

@keyframes explode{
0%{opacity:1;transform:translate(0,0)}
100%{opacity:0;transform:translate(var(--x),var(--y))}
}

/* mensagem final */

#final{
display:none;
font-size:40px;
margin-top:20px;
}

/* rodapé */

footer{
position:absolute;
bottom:10px;
font-size:14px;
}

</style>

</head>
