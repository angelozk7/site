<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Minha Princesa</title>

<style>

body{
margin:0;
padding:0;
background:#ffc0cb;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

h1{
margin-top:40px;
color:#fff;
font-size:28px;
}

.fio{
margin-top:80px;
font-size:22px;
cursor:pointer;
color:#fff;
}

.corda{
width:4px;
height:120px;
background:white;
margin:0 auto;
}

.carta{
display:none;
margin-top:20px;
}

.envelope{
width:200px;
height:120px;
background:#fff;
margin:auto;
border-radius:10px;
position:relative;
}

.coracao{
font-size:40px;
cursor:pointer;
margin-top:20px;
}

.mensagem{
display:none;
font-size:28px;
color:#fff;
margin-top:20px;
}

footer{
margin-top:120px;
color:white;
font-size:14px;
}

.heart{
position:fixed;
color:red;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

</style>
</head>

<body>

<h1>oie minha princesa linda 💕</h1>

<div class="fio" onclick="puxarFio()">
🧵 puxe o fio
</div>

<div class="corda"></div>

<div class="carta" id="carta">

<div class="envelope"></div>

<div class="coracao" onclick="abrirMensagem()">
❤️
</div>

</div>

<div class="mensagem" id="mensagem">
eu te amo, minha gatinha linda, tenha um otimo dia mia franjuda ❤️
</div>

<footer>
feito com amor por angelo
</footer>

<audio id="musica" src="musica.mp3"></audio>

<script>

function puxarFio(){

document.getElementById("carta").style.display="block"

document.getElementById("musica").play()

}

function abrirMensagem(){

document.getElementById("mensagem").style.display="block"

}

function criarCoracao(){

const heart=document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

heart.style.fontSize=(Math.random()*20+10)+"px"

document.body.appendChild(heart)

setTimeout(()=>{heart.remove()},6000)

}

setInterval(criarCoracao,300)

</script>

</body>
</html>
