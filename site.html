<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para minha princesa ❤️</title>

<style>

body{
margin:0;
height:100vh;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(#ff9ecf,#ff6fb0);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
}

/* corações no fundo */

.bg-heart{
position:absolute;
font-size:22px;
animation:float 6s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* fio */

#fio{
width:6px;
height:80px;
background:white;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

/* envelope */

.envelope{
width:220px;
height:130px;
background:white;
position:relative;
margin-top:20px;
border-radius:10px;
cursor:pointer;
}

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-top:65px solid #ffd6e7;
transition:0.6s;
}

.envelope.open:before{
transform:rotateX(180deg);
top:-65px;
}

/* carta */

.carta{
display:none;
background:white;
color:#ff4fa3;
padding:20px;
border-radius:10px;
margin-top:15px;
}

/* coração */

.heart{
font-size:70px;
cursor:pointer;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* explosão */

.explode{
position:absolute;
font-size:26px;
animation:explode 1s forwards;
}

@keyframes explode{
0%{opacity:1;transform:translate(0,0)}
100%{opacity:0;transform:translate(var(--x),var(--y))}
}

/* botão */

button{
padding:12px 25px;
border:none;
border-radius:20px;
font-size:18px;
cursor:pointer;
margin-top:15px;
background:white;
color:#ff4fa3;
font-weight:bold;
}

/* rodapé */

footer{
position:absolute;
bottom:10px;
font-size:14px;
}

</style>
</head>

<body>

<!-- música -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/VIDEO_ID?autoplay=1&start=40"
title="musica"
frameborder="0"
allow="autoplay">
</iframe>

<h1>oie minha princesa linda 💕</h1>

<div id="fio"></div>

<div id="envelope" class="envelope" style="display:none"></div>

<div id="carta" class="carta">
<p>clique no coração</p>
<div class="heart" onclick="amor()">❤️</div>
</div>

<h1 id="final" style="display:none">EU TE AMO ❤️</h1>

<div id="whats" style="display:none">
<button onclick="whatsapp()">enviar no whatsapp 💌</button>
</div>

<footer>feito com amor por angelo ❤️</footer>

<script>

/* puxar fio */

document.getElementById("fio").onclick = () =>{
document.getElementById("envelope").style.display="block"
}

/* abrir envelope */

document.getElementById("envelope").onclick = function(){
this.classList.add("open")
document.getElementById("carta").style.display="block"
}

/* clicar no coração */

function amor(){

document.getElementById("final").style.display="block"
document.getElementById("whats").style.display="block"

for(let i=0;i<25;i++){

let heart=document.createElement("div")
heart.className="explode"
heart.innerHTML="❤️"

heart.style.left="50%"
heart.style.top="50%"

heart.style.setProperty("--x",(Math.random()*400-200)+"px")
heart.style.setProperty("--y",(Math.random()*400-200)+"px")

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),1000)

}

}

/* botão whatsapp */

function whatsapp(){

let link="COLE_AQUI_O_LINK_DO_SEU_SITE"

let msg="olha o site que fiz pra você ❤️ "+link

window.open("https://wa.me/?text="+encodeURIComponent(msg))

}

/* gerar corações no fundo */

setInterval(()=>{

let heart=document.createElement("div")
heart.className="bg-heart"
heart.innerHTML="💗"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

},300)

</script>

</body>
</html>
